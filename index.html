<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gazdasági Matematika 2 | Kezdőlap</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #10b981;
            --secondary-hover: #059669;
            --card-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #f8fafc;
                --card-bg: #1e293b;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        @media (min-width: 480px) {
            .button-group {
                flex-direction: row;
                justify-content: center;
            }
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.39);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
        }

        .btn-secondary {
            background-color: var(--secondary-color);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.39);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-hover);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gazdasági matematika fogalmak</h1>
        <p>Üdvözöllek! Ez a platform segít a Gazdasági Matematika 2 legfontosabb elméleti fogalmainak, definícióinak és képleteinek gyors elsajátításában. Válaszd ki a megtekinteni kívánt anyagot!</p>
        <div class="button-group">
            <a href="valoszinuseg.html" class="btn btn-primary">Valószínűségszámítás</a>
            <a href="vektor.html" class="btn btn-secondary">Mátrixok, vektorok</a>
        </div>
    </div>
</body>
</html>
